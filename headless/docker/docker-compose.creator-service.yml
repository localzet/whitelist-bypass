services:
  creator-service:
    image: ghcr.io/localzet/vconnect-creator-service:latest
    container_name: vconnect-creator-service
    restart: unless-stopped
    environment:
      USER_IDS: ${USER_IDS:?Set USER_IDS in .env}
      WORK_PLATFORM: ${WORK_PLATFORM:-telemost}
      WORK_COOKIE_SOURCE: ${WORK_COOKIE_SOURCE:-user}
      RESOURCES: ${RESOURCES:-default}
      MAX_ACTIVE_USERS: ${MAX_ACTIVE_USERS:-2}
      WORK_TTL: ${WORK_TTL:-30m}
      SERVICE_ROOM: ${SERVICE_ROOM:-}
      VAULT_KEY_FILE: /run/secrets/vault_key
      SERVICE_COOKIES: /run/secrets/yandex_cookies
      EGRESS_CONFIG: /config/egresses.json
    secrets:
      - vault_key
      - yandex_cookies
    volumes:
      - creator-data:/data
      - ./egresses.json:/config/egresses.json:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /data/service-call.txt"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

secrets:
  vault_key:
    file: ./secrets/vault-key.txt
  yandex_cookies:
    file: ./secrets/cookies-yandex.json

volumes:
  creator-data:
